<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Analyzer</title>

    <style>
        *::before,
        *::after,
        * {
            box-sizing: border-box;
        }

        body {
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: #e2e8f0;
  text-align: center;
  padding: 2rem;
  font-family: 'Segoe UI', sans-serif;
}

/* Title */
h1 {
  margin-bottom: 1rem;
  color: #38bdf8;
}

/* Strength Meter */
.strength-meter {
  position: relative;
  height: 2rem;
  width: 90%;
  border: 2px solid #38bdf8;
  border-radius: 1rem;
  margin: 0 auto;
  overflow: hidden;
  background-color: #0f172a;
}

.strength-meter::before {
  content: '';
  position: absolute;
  left: 0;
  height: 100%;
  width: calc(1% * var(--strength, 0));
  background: #1d5688;
  transition: width 300ms ease;
}


.password-input {
  margin-top: 1rem;
  width: 90%;
  padding: .8rem;
  background-color: #1e293b;
  color: #e2e8f0;
  border: 1px solid #38bdf8;
  border-radius: .5rem;
  font-size: 1rem;
}

.password-input:focus {
  border-color: #22c55e;
  outline: none;
}

/* Weakness messages */
.reasons > * {
  margin-top: .5rem;
  color: #94a3b8;
}

/* Suggestion box */
.suggestion-box {
  width: 90%;
  margin: 1rem auto;
  padding: 1rem;
  background: #1e293b;
  border: 1px solid #38bdf8;
  border-radius: .6rem;
}

.suggestion-box h3 {
  margin-bottom: .5rem;
  color: #22c55e;
}

#suggested-password {
  font-size: 1.2rem;
  color: #facc15;
  word-break: break-all;
}
    </style>
</head>

<body>

    <h1>Password Strength Checker</h1>

    <div class="strength-meter" id="strength-meter"></div>

    <input
        class="password-input"
        id="password-input"
        type="text"
        placeholder="Enter Password"
        autofocus
    >

    <div id="reasons" class="reasons"></div>

    <div class="suggestion-box">
        <h3>Suggested Strong Password</h3>
        <div id="suggested-password"></div>
    </div>

    <script>
        const strengthMeter = document.getElementById('strength-meter')
        const passwordInput = document.getElementById('password-input')
        const reasonsContainer = document.getElementById('reasons')
        const suggestedPassword = document.getElementById('suggested-password')

        passwordInput.addEventListener('input', updateStrengthMeter)

        updateStrengthMeter()

        function updateStrengthMeter() {
            const password = passwordInput.value
            const weaknesses = calculatePasswordStrength(password)

            let strength = 100

            reasonsContainer.innerHTML = ''

            weaknesses.forEach(weakness => {
                if (weakness == null) return

                strength -= weakness.deduction

                const messageElement = document.createElement('div')
                messageElement.innerText = weakness.message

                reasonsContainer.appendChild(messageElement)
            })

            strengthMeter.style.setProperty('--strength', strength)

            if (strength < 70) {
                suggestedPassword.innerText = generateStrongPassword()
            } else {
                suggestedPassword.innerText = "Your password is strong!"
            }
        }

        function calculatePasswordStrength(password) {
            const weaknesses = []

            weaknesses.push(lengthWeakness(password))
            weaknesses.push(lowercaseWeakness(password))
            weaknesses.push(uppercaseWeakness(password))
            weaknesses.push(numberWeakness(password))
            weaknesses.push(specialCharactersWeakness(password))
            weaknesses.push(repeatCharactersWeakness(password))
            weaknesses.push(commonPasswordWeakness(password))

            return weaknesses
        }

        function lengthWeakness(password) {
            const length = password.length

            if (length <= 5) {
                return {
                    message: 'Your password is too short',
                    deduction: 40
                }
            }

            if (length <= 10) {
                return {
                    message: 'Your password could be longer',
                    deduction: 15
                }
            }
        }

        function uppercaseWeakness(password) {
            return characterTypeWeakness(password, /[A-Z]/g, 'uppercase characters')
        }

        function lowercaseWeakness(password) {
            return characterTypeWeakness(password, /[a-z]/g, 'lowercase characters')
        }

        function numberWeakness(password) {
            return characterTypeWeakness(password, /[0-9]/g, 'numbers')
        }

        function specialCharactersWeakness(password) {
            return characterTypeWeakness(password, /[^0-9a-zA-Z\s]/g, 'special characters')
        }

        function characterTypeWeakness(password, regex, type) {
            const matches = password.match(regex) || []

            if (matches.length === 0) {
                return {
                    message: `Your password has no ${type}`,
                    deduction: 20
                }
            }

            if (matches.length < 2) {
                return {
                    message: `Your password could use more ${type}`,
                    deduction: 5
                }
            }
        }

        function repeatCharactersWeakness(password) {
            const matches = password.match(/(.)\1/g) || []

            if (matches.length > 0) {
                return {
                    message: 'Your password has repeat characters',
                    deduction: matches.length * 10
                }
            }
        }

        function commonPasswordWeakness(password) {
            const commonPasswords = [
                'password',
                '123456',
                'qwerty',
                'admin',
                'password123'
            ]

            if (commonPasswords.includes(password.toLowerCase())) {
                return {
                    message: 'This password is too common',
                    deduction: 40
                }
            }
        }

        function generateStrongPassword() {
            const lowercase = "abcdefghijklmnopqrstuvwxyz"
            const uppercase = "ABCDEFGHIJKLMNOPQRSTUVWXYZ"
            const numbers = "0123456789"
            const special = "!@#$%^&*()_+"

            const allChars = lowercase + uppercase + numbers + special

            let password = ""

            password += lowercase[Math.floor(Math.random() * lowercase.length)]
            password += uppercase[Math.floor(Math.random() * uppercase.length)]
            password += numbers[Math.floor(Math.random() * numbers.length)]
            password += special[Math.floor(Math.random() * special.length)]

            for (let i = 0; i < 8; i++) {
                password += allChars[Math.floor(Math.random() * allChars.length)]
            }

            password = password.split('').sort(() => Math.random() - 0.5).join('')

            return password
        }
    </script>

</body>
</html>
